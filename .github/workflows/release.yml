name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create
        required: true
        default: v0.1.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_REF_NAME}"; fi
          gh release create "$TAG" \
            target/DEench-0.1.0.jar \
            --target "${GITHUB_SHA}" \
            --title "DEench ${TAG}" \
            --notes "DragonEggSV plugin build ${TAG}, built against Paper 1.21.8."
